name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend · lint & tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # System libs required by opencv-python-headless.
          sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app scripts

      - name: Run tests (pytest)
        env:
          STORAGE_DIR: /tmp/hv-uploads
        run: pytest

  frontend:
    name: Frontend · lint, tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (eslint)
        run: npm run lint

      - name: Unit tests (vitest)
        run: npm run test

      - name: Type-check & build
        run: npm run build

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t healthvision-backend ./backend
      - name: Build frontend image
        run: docker build -t healthvision-frontend ./frontend
