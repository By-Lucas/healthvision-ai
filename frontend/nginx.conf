server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS so upstream hostnames are resolved at request
    # time, not at startup. This lets nginx boot even if the backend container
    # is not up yet (avoids "host not found in upstream" crashes).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API + uploaded images to the backend service (docker-compose network).
    # proxy_pass with a variable defers DNS resolution to request time.
    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /uploads/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
    }
    location = /health {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
    }
}
