[tool.ruff]
line-length = 88
target-version = "py311"
src = ["app"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4"]
ignore = [
    "B008",   # FastAPI uses function calls in defaults (Depends/File)
    "UP042",  # keep `str, Enum` (intentional, broadly compatible)
]

[tool.ruff.lint.per-file-ignores]
"app/tests/*" = ["B", "E501"]
